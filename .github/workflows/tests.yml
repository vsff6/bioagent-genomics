name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install lightweight test dependencies
        # scanpy/anndata are optional — tests skip gracefully when absent.
        # pysam has no Windows wheel; BAM/CRAM tests degrade gracefully.
        # samtools/bcftools/bedtools are NOT installed here by design:
        #   - parser tests (test_external_tools.py) use fixture files, not live tool calls
        #   - degradation tests verify tools produce skipped-with-caveat JSON when absent
        #   - if you want integration tests with real tools, install them before running pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas scipy matplotlib seaborn h5py

      - name: Install scanpy (Linux only — large install, skip on Windows for speed)
        if: runner.os == 'Linux'
        run: pip install "scanpy>=1.9" "anndata>=0.10"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7
